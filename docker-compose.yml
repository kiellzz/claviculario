services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: claviculario
      POSTGRES_USER: claviculario
      POSTGRES_PASSWORD: claviculario
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  web:
    build: .
    command: uv run daphne -b 0.0.0.0 -p 8000 config.asgi:application
    environment:
      SECRET_KEY: ${SECRET_KEY:-django-insecure-local-dev-change-me}
      DEBUG: ${DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,web}
      HARDWARE_TOKEN: ${HARDWARE_TOKEN:-local-hardware-token}
      DATABASE_URL: postgres://claviculario:claviculario@db:5432/claviculario
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  celery:
    build: .
    command: uv run celery -A config worker -l info
    environment:
      SECRET_KEY: ${SECRET_KEY:-django-insecure-local-dev-change-me}
      DATABASE_URL: postgres://claviculario:claviculario@db:5432/claviculario
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - db
      - redis

  celery-beat:
    build: .
    command: uv run celery -A config beat -l info
    environment:
      SECRET_KEY: ${SECRET_KEY:-django-insecure-local-dev-change-me}
      DATABASE_URL: postgres://claviculario:claviculario@db:5432/claviculario
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
